<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Locale &middot; breast, from organ to cell</title>
<style>
  :root { --ink:#eef1f6; --muted:#9aa4b2; --panel:#10131a; --border:#2a2f3a; --accent:#6ea8fe; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:#05070b; color:var(--ink); overflow:hidden;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; }
  #scene { position:fixed; inset:0; overflow:hidden; cursor:ns-resize; }
  .layer { position:absolute; inset:0; background-position:center; background-size:cover;
    background-repeat:no-repeat; transform-origin:center center; will-change:transform,opacity;
    transition:transform .45s cubic-bezier(.22,.61,.36,1), opacity .45s ease; opacity:0;
    backface-visibility:hidden; }
  #vignette { position:fixed; inset:0; pointer-events:none; z-index:5;
    box-shadow:inset 0 0 200px 60px rgba(5,7,11,.85); }

  header { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:center;
    gap:14px; padding:16px 22px; background:linear-gradient(#05070bcc,#05070b00); }
  header h1 { font-size:15px; font-weight:600; letter-spacing:.3px; }
  header .sub { color:var(--muted); font-size:12px; }
  header .spacer { flex:1; }
  header a { color:var(--accent); font-size:12px; text-decoration:none; }
  header a:hover { text-decoration:underline; }

  #rail { position:fixed; left:22px; top:50%; transform:translateY(-50%); z-index:10;
    display:flex; flex-direction:column; gap:0; }
  #rail .stop { display:flex; align-items:center; gap:10px; height:46px; cursor:pointer; opacity:.5;
    transition:opacity .3s; }
  #rail .stop.on { opacity:1; }
  #rail .tick { width:11px; height:11px; border-radius:50%; border:2px solid var(--muted);
    background:transparent; flex:none; transition:all .3s; }
  #rail .stop.on .tick { border-color:var(--accent); background:var(--accent);
    box-shadow:0 0 12px var(--accent); }
  #rail .lbl { font-size:11px; color:var(--muted); white-space:nowrap; letter-spacing:.2px; }
  #rail .stop.on .lbl { color:var(--ink); font-weight:600; }
  #rail .line { position:absolute; left:5px; top:8px; bottom:8px; width:1px; background:var(--border); z-index:-1; }

  #caption { position:fixed; right:22px; bottom:26px; z-index:10; max-width:340px;
    background:#0b0e14cc; border:1px solid var(--border); border-radius:12px; padding:14px 16px;
    backdrop-filter:blur(8px); }
  #caption .stage { font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--accent); }
  #caption .name { font-size:17px; font-weight:650; margin:3px 0 6px; }
  #caption .desc { font-size:12.5px; color:var(--muted); line-height:1.55; }
  #caption .scale { margin-top:11px; display:flex; align-items:center; gap:9px; }
  #caption .bar { height:3px; width:110px; background:var(--ink); border-radius:2px; }
  #caption .barlbl { font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }

  #hint { position:fixed; left:50%; bottom:26px; transform:translateX(-50%); z-index:10;
    color:var(--muted); font-size:12.5px; display:flex; align-items:center; gap:8px;
    background:#0b0e14aa; border:1px solid var(--border); border-radius:20px; padding:8px 15px;
    transition:opacity .4s; }
  #hint .kbd { border:1px solid var(--border); border-radius:5px; padding:0 6px; color:var(--ink); font-size:11px; }
  #hint.gone { opacity:0; }

  #zoom { position:fixed; right:22px; top:50%; transform:translateY(-50%); z-index:10;
    display:flex; flex-direction:column; gap:8px; }
  #zoom button { width:38px; height:38px; border-radius:10px; border:1px solid var(--border);
    background:#0b0e14cc; color:var(--ink); font-size:19px; cursor:pointer; line-height:1; }
  #zoom button:hover { border-color:var(--accent); color:var(--accent); }

  #credits { position:fixed; left:22px; bottom:14px; z-index:10; color:#5b6472; font-size:10.5px; max-width:46ch; }
  #credits a { color:#7b8494; text-decoration:none; }
</style>
</head>
<body>
<div id="scene"></div>
<div id="vignette"></div>

<header>
  <h1>Locale</h1>
  <span class="sub">breast &middot; from organ to single cell</span>
  <span class="spacer"></span>
  <a href="dashboard.html">niche analysis &rarr;</a>
</header>

<div id="rail"><div class="line"></div></div>

<div id="caption">
  <div class="stage" id="cap-stage"></div>
  <div class="name" id="cap-name"></div>
  <div class="desc" id="cap-desc"></div>
  <div class="scale"><span class="bar" id="cap-bar"></span><span class="barlbl" id="cap-barlbl"></span></div>
</div>

<div id="hint"><span>scroll to dive in</span><span class="kbd">scroll</span></div>
<div id="zoom"><button id="zin">+</button><button id="zout">&minus;</button></div>

<div id="credits">
  Real tissue. Breast cross-section &copy; Patrick J. Lynch (CC BY 3.0). Histology by
  Mikael H&auml;ggstr&ouml;m (CC0), <a href="assets/tissue/SOURCES.md">sources</a>.
</div>

<script>
(function () {
  "use strict";
  var STAGES = [
    { img:"assets/tissue/0_breast.jpg", stage:"Organ", name:"Breast tissue",
      desc:"Ductal-lobular units (mauve) threaded through fat and vessels. Milk ducts branch through the breast toward the nipple.", fov:9000 },
    { img:"assets/tissue/1_duct.jpg", stage:"~1 mm", name:"A milk duct, filled",
      desc:"A duct in cross-section. Its lumen is packed with ductal carcinoma in situ (DCIS) — cancer still trapped inside the duct, with dark central necrosis.", fov:1600 },
    { img:"assets/tissue/2_tissue.jpg", stage:"~600 µm", name:"Invasive tumor",
      desc:"The cancer has broken out of the ducts and infiltrates the surrounding stroma and fat as irregular glands and cords.", fov:700 },
    { img:"assets/tissue/3_nest.jpg", stage:"~300 µm", name:"Tumor cell nests",
      desc:"Nests and cords of malignant epithelial cells wind between bands of pink collagen — the tumor's own disordered architecture.", fov:350 },
    { img:"assets/tissue/4_cells.jpg", stage:"~150 µm", name:"Cancer cells, among normal",
      desc:"Individual carcinoma cells — big, dark, irregular nuclei — clustered right beside normal fat cells (clear) and collagen. Malignant and normal, side by side.", fov:150 }
  ];
  var N = STAGES.length;
  var scene = document.getElementById("scene");
  var rail = document.getElementById("rail");
  var hint = document.getElementById("hint");

  var layers = STAGES.map(function (s, i) {
    var el = document.createElement("div");
    el.className = "layer";
    el.style.backgroundImage = "url('" + s.img + "')";
    el.style.zIndex = String(i);
    scene.appendChild(el);
    var stop = document.createElement("div");
    stop.className = "stop"; stop.dataset.i = i;
    stop.innerHTML = '<span class="tick"></span><span class="lbl">' + s.name + "</span>";
    stop.addEventListener("click", function () { glideTo(i); });
    rail.appendChild(stop);
    return el;
  });

  var zoom = 0, target = 0, MAXZ = N - 1;
  function smoothstep(a, b, x) { var t = Math.min(1, Math.max(0, (x - a) / (b - a))); return t * t * (3 - 2 * t); }

  function apply() {
    for (var k = 0; k < N; k++) {
      var L = zoom - k;
      var op = smoothstep(-1.0, -0.15, L) * (1 - smoothstep(0.65, 1.5, L));
      var el = layers[k];
      if (op <= 0.002) { el.style.opacity = "0"; el.style.visibility = "hidden"; continue; }
      el.style.visibility = "visible";
      el.style.opacity = op.toFixed(3);
      el.style.transform = "scale(" + Math.pow(2, L).toFixed(4) + ")";
    }
    var idx = Math.max(0, Math.min(N - 1, Math.round(zoom)));
    var s = STAGES[idx];
    document.getElementById("cap-stage").textContent = "Scale " + (idx + 1) + " / " + N + " · " + s.stage;
    document.getElementById("cap-name").textContent = s.name;
    document.getElementById("cap-desc").textContent = s.desc;
    var fov = STAGES[0].fov * Math.pow(STAGES[N - 1].fov / STAGES[0].fov, zoom / MAXZ);
    var w = scene.clientWidth || window.innerWidth || 1280;
    var umPerBar = fov * (110 / w);
    document.getElementById("cap-barlbl").textContent =
      umPerBar >= 1000 ? (umPerBar / 1000).toFixed(1) + " mm" : Math.round(umPerBar) + " µm";
    var stops = rail.querySelectorAll(".stop");
    for (var j = 0; j < stops.length; j++) stops[j].classList.toggle("on", j === idx);
  }

  // Set the zoom target directly and let the layers' CSS transitions ease the change
  // (transform/opacity transitions), so the glide never depends on requestAnimationFrame.
  function glide() { zoom = target; apply(); }
  function glideTo(i) { target = Math.max(0, Math.min(MAXZ, i)); glide(); }
  function nudge(d) { target = Math.max(0, Math.min(MAXZ, target + d)); glide(); }

  scene.addEventListener("wheel", function (e) {
    e.preventDefault();
    target = Math.max(0, Math.min(MAXZ, target + (e.deltaY > 0 ? -1 : 1) * Math.min(0.5, Math.abs(e.deltaY) * 0.0016 + 0.12)));
    hint.classList.add("gone");
    glide();
  }, { passive: false });

  document.getElementById("zin").addEventListener("click", function () { nudge(0.6); hint.classList.add("gone"); });
  document.getElementById("zout").addEventListener("click", function () { nudge(-0.6); });
  window.addEventListener("keydown", function (e) {
    if (e.key === "+" || e.key === "=" || e.key === "ArrowUp") { nudge(0.5); hint.classList.add("gone"); }
    if (e.key === "-" || e.key === "ArrowDown") nudge(-0.5);
  });
  window.addEventListener("resize", apply);

  apply();
})();
</script>
</body>
</html>
